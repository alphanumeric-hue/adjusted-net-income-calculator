services:
  frontend:
    image: ghcr.io/alphanumeric-hue/adjusted-net-income-calculator/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app

  api:
    image: ghcr.io/alphanumeric-hue/adjusted-net-income-calculator/api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app

  db:
    image: docker.io/library/postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  pgdata:
