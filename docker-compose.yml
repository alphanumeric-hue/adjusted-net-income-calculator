services:
  frontend:
    image: ghcr.io/alphanumeric-hue/adjusted-net-income-calculator/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/alphanumeric-hue/adjusted-net-income-calculator/api:latest
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taxapp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
